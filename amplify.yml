version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NVM_DIR="$HOME/.nvm"
        - if [ ! -s "$NVM_DIR/nvm.sh" ]; then curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash; fi
        - . "$NVM_DIR/nvm.sh"
        - nvm install 22
        - nvm use 22
        - node -v
        - npm -v
        - cd next-app
        - npm install
    build:
      commands:
        - export NVM_DIR="$HOME/.nvm"
        - . "$NVM_DIR/nvm.sh"
        - nvm use 22
        - cd next-app
        - npm run build
  artifacts:
    baseDirectory: next-app/dist
    files:
      - "**/*"
  cache:
    paths:
      - next-app/node_modules/**/*
      - $HOME/.nvm/**/*
